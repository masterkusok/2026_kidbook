<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect width="760" height="300" fill="#f8f9fa" rx="12"/>
  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Структура сетевого пакета</text>

  <!-- Packet outer box -->
  <rect x="30" y="48" width="700" height="72" rx="8" fill="#fff" stroke="#bbb" stroke-width="1.5"/>

  <!-- Header block -->
  <rect x="30" y="48" width="210" height="72" rx="8" fill="#4a90d9"/>
  <text x="135" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">📋 Заголовок</text>
  <text x="135" y="100" text-anchor="middle" font-size="11" fill="#cce4ff">(Header) ~40 байт</text>

  <!-- Payload block -->
  <rect x="240" y="48" width="490" height="72" rx="8" fill="#27ae60"/>
  <text x="485" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">📦 Полезная нагрузка (Payload)</text>
  <text x="485" y="100" text-anchor="middle" font-size="11" fill="#ccffdd">до ~1460 байт — сами данные</text>

  <!-- Arrows down -->
  <line x1="135" y1="122" x2="135" y2="145" stroke="#4a90d9" stroke-width="2"/>
  <line x1="485" y1="122" x2="485" y2="145" stroke="#27ae60" stroke-width="2"/>

  <!-- Header details box -->
  <rect x="20" y="148" width="230" height="122" rx="8" fill="#e8f4ff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="135" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5276">Что в заголовке:</text>
  <text x="135" y="186" text-anchor="middle" font-size="11" fill="#333">📍 IP отправителя</text>
  <text x="135" y="204" text-anchor="middle" font-size="11" fill="#333">📍 IP получателя</text>
  <text x="135" y="222" text-anchor="middle" font-size="11" fill="#333">🔢 Номер пакета</text>
  <text x="135" y="240" text-anchor="middle" font-size="11" fill="#333">📏 Размер данных</text>
  <text x="135" y="258" text-anchor="middle" font-size="11" fill="#333">✅ Контрольная сумма</text>

  <!-- Payload details box -->
  <rect x="270" y="148" width="470" height="122" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="505" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">Что в payload:</text>
  <text x="505" y="186" text-anchor="middle" font-size="11" fill="#333">🌐 Кусочек веб-страницы</text>
  <text x="505" y="204" text-anchor="middle" font-size="11" fill="#333">🎮 Позиция игрока в онлайн-игре</text>
  <text x="505" y="222" text-anchor="middle" font-size="11" fill="#333">📧 Часть письма</text>
  <text x="505" y="240" text-anchor="middle" font-size="11" fill="#333">🎵 Фрагмент аудио или видео</text>
  <text x="505" y="258" text-anchor="middle" font-size="11" fill="#333">📁 Часть скачиваемого файла</text>

  <text x="380" y="290" text-anchor="middle" font-size="10" fill="#999">Типичный размер пакета Ethernet: 1500 байт (MTU)</text>
</svg>
