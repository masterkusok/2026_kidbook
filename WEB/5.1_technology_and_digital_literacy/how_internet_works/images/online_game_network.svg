<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#1a1a2e" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#e0e0ff">Как данные летят в онлайн-игре</text>

  <!-- Player 1 -->
  <rect x="40" y="80" width="140" height="80" rx="10" fill="#4a90d9" opacity="0.9"/>
  <text x="110" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">🎮 Игрок 1</text>
  <text x="110" y="132" text-anchor="middle" font-size="11" fill="#cce4ff">Твой компьютер</text>
  <text x="110" y="148" text-anchor="middle" font-size="10" fill="#aad4ff">IP: 192.168.1.5</text>

  <!-- Player 2 -->
  <rect x="620" y="80" width="140" height="80" rx="10" fill="#e67e22" opacity="0.9"/>
  <text x="690" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">🎮 Игрок 2</text>
  <text x="690" y="132" text-anchor="middle" font-size="11" fill="#ffe0cc">Другой игрок</text>
  <text x="690" y="148" text-anchor="middle" font-size="10" fill="#ffd0aa">IP: 85.14.22.7</text>

  <!-- Game Server -->
  <rect x="300" y="60" width="200" height="100" rx="10" fill="#27ae60" opacity="0.9"/>
  <text x="400" y="95" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">🖥️ Игровой сервер</text>
  <text x="400" y="115" text-anchor="middle" font-size="11" fill="#ccffdd">Хранит состояние игры</text>
  <text x="400" y="133" text-anchor="middle" font-size="10" fill="#aaffcc">Порт UDP: 27015</text>
  <text x="400" y="149" text-anchor="middle" font-size="10" fill="#aaffcc">Порт TCP: 443</text>

  <!-- Arrow: Player1 -> Server (UDP, position) -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8e44ad"/>
    </marker>
  </defs>

  <!-- Player1 -> Server UDP -->
  <line x1="180" y1="105" x2="298" y2="105" stroke="#4a90d9" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <rect x="192" y="82" width="100" height="18" rx="4" fill="#1a1a2e" opacity="0.8"/>
  <text x="242" y="95" text-anchor="middle" font-size="10" fill="#4a90d9">UDP: позиция игрока</text>

  <!-- Server -> Player1 UDP -->
  <line x1="298" y1="125" x2="180" y2="125" stroke="#27ae60" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <rect x="192" y="127" width="100" height="18" rx="4" fill="#1a1a2e" opacity="0.8"/>
  <text x="242" y="140" text-anchor="middle" font-size="10" fill="#27ae60">UDP: мир вокруг тебя</text>

  <!-- Player2 -> Server UDP -->
  <line x1="620" y1="105" x2="502" y2="105" stroke="#e67e22" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <rect x="508" y="82" width="106" height="18" rx="4" fill="#1a1a2e" opacity="0.8"/>
  <text x="561" y="95" text-anchor="middle" font-size="10" fill="#e67e22">UDP: позиция игрока</text>

  <!-- Server -> Player2 UDP -->
  <line x1="502" y1="125" x2="620" y2="125" stroke="#27ae60" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <rect x="508" y="127" width="106" height="18" rx="4" fill="#1a1a2e" opacity="0.8"/>
  <text x="561" y="140" text-anchor="middle" font-size="10" fill="#27ae60">UDP: мир вокруг тебя</text>

  <!-- TCP login arrow (Player1 -> Server) -->
  <path d="M110,160 Q110,230 300,200" stroke="#8e44ad" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowPurple)"/>
  <text x="170" y="215" text-anchor="middle" font-size="10" fill="#8e44ad">TCP: вход в игру</text>

  <!-- Divider line -->
  <line x1="40" y1="280" x2="760" y2="280" stroke="#444" stroke-width="1"/>

  <!-- Legend -->
  <text x="400" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#e0e0ff">Что и зачем</text>

  <!-- UDP legend -->
  <rect x="60" y="318" width="14" height="14" rx="3" fill="#4a90d9"/>
  <text x="82" y="330" font-size="11" fill="#ccc">UDP — позиция, выстрелы, движение (нужна скорость)</text>

  <!-- TCP legend -->
  <rect x="60" y="342" width="14" height="14" rx="3" fill="#8e44ad"/>
  <text x="82" y="354" font-size="11" fill="#ccc">TCP — вход, чат, покупки в магазине (нужна надёжность)</text>

  <!-- Tick rate note -->
  <rect x="60" y="366" width="14" height="14" rx="3" fill="#27ae60"/>
  <text x="82" y="378" font-size="11" fill="#ccc">Сервер обновляет мир 20–128 раз в секунду (tick rate)</text>

  <!-- Latency note -->
  <text x="400" y="408" text-anchor="middle" font-size="10" fill="#666">⚡ Пинг = время туда + обратно. 20 мс — отлично, 200 мс — лаги!</text>
</svg>
